<!DOCTYPE html>
<html>
<head>
    <title>Smart Canteen · Professional Management System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Optional: add Google Font for a more professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 5 (professional icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="hero">
    <!-- Subtle overlay & modern grid background -->
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <!-- Logo / brand mark -->
        <div class="brand-icon">
            <i class="fas fa-utensils"></i>
        </div>
        <h1>Smart<span>Canteen</span></h1>
        <p class="subhead">Order food easily · Manage orders efficiently</p>
        <div class="hero-features">
            <div class="feature">
                <i class="fas fa-bolt"></i>
                <span>Real‑time orders</span>
            </div>
            <div class="feature">
                <i class="fas fa-chart-line"></i>
                <span>Smart analytics</span>
            </div>
            <div class="feature">
                <i class="fas fa-mobile-alt"></i>
                <span>Mobile ready</span>
            </div>
        </div>
        <a href="/login" class="hero-btn">
            <span>Login to dashboard</span>
            <i class="fas fa-arrow-right"></i>
        </a>
        <p class="demo-hint">
            <i class="fas fa-shield-alt"></i> Secure access · Staff & students
        </p>
    </div>
    <!-- Decorative abstract shape (optional) -->
    <div class="hero-shape"></div>
</div>

</body>
</html>
